<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>剑网三 团牌记录</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='5' fill='%23F7F4EF'/><rect x='2' y='2' width='28' height='28' rx='3.5' fill='none' stroke='%239A7230' stroke-width='2.5'/><text x='16' y='24' font-size='19' font-family='serif' text-anchor='middle' fill='%239A7230' font-weight='bold'>录</text></svg>">
  <style>
    :root {
      --bg:       #F7F4EF;   /* 豆乳/宣纸底色 */
      --surface:  #FFFFFF;
      --card:     #F2EEE7;   /* 浅暖灰，用于表头、chip 底 */
      --accent:   #9A7230;   /* 古铜金，白底可读 */
      --accent-light: rgba(154,114,48,0.1);
      --text:     #2C2820;
      --text-dim: #8A7F72;
      --green:    #3D8A5C;
      --orange:   #C07828;
      --red:      #A82838;
      --border:   #DDD8CF;
      --input-bg: #FFFFFF;
      --star:     #C09020;
      --shadow:   0 2px 12px rgba(60,40,10,0.07);
      --shadow-sm:0 1px 4px  rgba(60,40,10,0.06);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: '微软雅黑', 'Microsoft YaHei', sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(180deg, #FFFEF9 0%, #FDFAF3 100%);
      border-bottom: 1px solid rgba(201,160,99,0.38);
      box-shadow: 0 1px 10px rgba(60,40,10,0.06), 0 3px 22px rgba(60,40,10,0.03);
      padding: 15px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-brand { display: flex; flex-direction: column; gap: 3px; padding-left: 5px; }
    header h1 {
      font-size: 1.42rem;
      color: var(--accent);
      letter-spacing: 4px;
      font-weight: bold;
      display: flex; align-items: baseline; gap: 0;
      line-height: 1;
      position: relative;
    }
    .h1-icon {
      font-size: 1em;
      margin-right: 9px;
      color: #C9A063;
      filter: drop-shadow(0 0 4px rgba(201,160,99,0.55));
      display: inline-block;
      line-height: 1;
    }
    .h1-count {
      font-size: 0.46em;
      font-weight: normal;
      color: rgba(154,114,48,0.62);
      letter-spacing: 0;
      vertical-align: super;
      margin-left: 3px;
      line-height: 1;
    }
    .header-sub {
      font-size: 0.76rem;
      color: var(--text-dim);
      letter-spacing: 2px;
      opacity: 0.75;
      padding-left: 2px;
      display: flex;
      align-items: center;
      gap: 0;
      flex-wrap: wrap;
    }
    .header-count-sep {
      margin: 0 8px;
      opacity: 0.35;
    }
    .header-count {
      font-size: 0.74rem;
      color: rgba(154,114,48,0.72);
      letter-spacing: 1.5px;
    }
    .header-count #headerCountNum {
      font-weight: bold;
      color: rgba(154,114,48,0.9);
      letter-spacing: 0;
      margin: 0 2px;
    }
    .header-season {
      font-size: 0.7rem;
      color: rgba(154,114,48,0.58);
      letter-spacing: 4px;
      font-weight: bold;
      border: 1px solid rgba(154,114,48,0.22);
      padding: 5px 11px;
      border-radius: 2px;
      background: rgba(253,248,238,0.6);
      white-space: nowrap;
    }

    /* ── Header 右侧：数据中心区域 ── */
    .header-actions {
      display: flex; flex-direction: column; align-items: flex-end; gap: 7px;
    }
    .header-data-center {
      display: flex; align-items: center; gap: 10px;
    }
    /* 同步状态徽章 */
    .sync-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 0.72rem; padding: 3px 10px; border-radius: 2px;
      border: 1px solid transparent; transition: all 0.3s;
      white-space: nowrap; cursor: default; letter-spacing: 0.5px;
    }
    .sync-badge.hidden  { display: none; }
    .sync-badge.syncing { color: rgba(154,114,48,0.65); border-color: rgba(154,114,48,0.22); background: rgba(253,248,238,0.5); }
    .sync-badge.ok      { color: rgba(61,138,92,0.8);   border-color: rgba(61,138,92,0.25);  background: rgba(61,138,92,0.06); }
    .sync-badge.error   { color: rgba(168,40,56,0.8);   border-color: rgba(168,40,56,0.25);  background: rgba(168,40,56,0.06); }
    @keyframes spin-sync { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .sync-badge.syncing .sync-icon { display: inline-block; animation: spin-sync 1s linear infinite; }
    /* 手动备份幽灵按钮 */
    .btn-backup {
      background: none;
      border: 1px solid rgba(154,114,48,0.35); color: var(--accent);
      padding: 3px 14px; border-radius: 2px; cursor: pointer;
      font-size: 0.72rem; font-family: inherit; letter-spacing: 1px;
      transition: all 0.2s; white-space: nowrap;
    }
    .btn-backup:hover:not(:disabled) { background: var(--accent-light); border-color: var(--accent); }
    .btn-backup:disabled { opacity: 0.55; cursor: default; }

    /* ── Nav ── */
    nav { display: flex; background: #FDFAF5; border-bottom: 1px solid rgba(201,160,99,0.22); padding: 0 32px; }
    nav button {
      position: relative;
      background: none; border: none; color: var(--text-dim);
      padding: 13px 28px; cursor: pointer; font-size: 0.95rem; font-family: inherit;
      border-bottom: 2px solid transparent; transition: all 0.2s;
    }
    nav button.active { color: var(--accent); border-bottom-color: transparent; font-weight: bold; }
    nav button.active::after {
      content: '';
      position: absolute;
      bottom: -2px; left: 22%; right: 22%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #D4AF37 30%, #C9A063 70%, transparent);
      border-radius: 1px;
    }
    nav button:hover:not(.active) { color: var(--text); }

    /* ── Layout ── */
    main { max-width: 1200px; margin: 0 auto; padding: 28px 32px; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
    }
    .card-title {
      font-size: 1.05rem; color: var(--accent); font-weight: bold;
      margin-bottom: 20px; padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      letter-spacing: 1px;
    }

    /* ── Form ── */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 0.8rem; color: var(--text-dim); letter-spacing: 0.5px; }

    input[type="text"], textarea, select {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      padding: 8px 12px;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }
    input[type="text"]:hover, textarea:hover, select:hover {
      border-color: rgba(93,117,153,0.58);
    }
    input[type="text"]:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #C9A063;
      box-shadow: 0 0 0 3px rgba(201,160,99,0.2);
    }
    input::placeholder, textarea::placeholder { color: #C8C0B4; }
    textarea { resize: vertical; min-height: 70px; }

    /* ── Section divider ── */
    .section-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 24px 0 16px; color: var(--accent); font-size: 0.72rem; letter-spacing: 2.5px; font-weight: bold;
    }
    .section-divider::before, .section-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .section-divider span {
      background: #FDF8EE; border: 1px solid #E8D9B8;
      padding: 2px 10px; border-radius: 3px; letter-spacing: 3px;
    }

    /* ── Rating ── */
    .rating-group { display: flex; gap: 10px; flex-wrap: wrap; }
    .rating-btn {
      display: flex; align-items: center; gap: 6px; cursor: pointer;
      padding: 7px 18px; border-radius: 20px; border: 1.5px solid var(--border);
      font-size: 0.88rem; transition: all 0.2s; user-select: none; color: var(--text-dim);
      background: #FFFFFF;
    }
    .rating-btn input { display: none; }
    .rating-btn.bilei:hover { background: rgba(184,64,80,0.06);  border-color: var(--red);    color: var(--red); }
    .rating-btn.buqu:hover  { background: rgba(192,120,40,0.06); border-color: var(--orange); color: var(--orange); }
    .rating-btn.keyi:hover  { background: rgba(61,138,92,0.06);  border-color: var(--green);  color: var(--green); }
    .rating-btn.bilei.selected { background: rgba(184,64,80,0.14);  border: 2px solid var(--red);    color: var(--red);    font-weight: bold; box-shadow: 0 2px 8px rgba(184,64,80,0.18); }
    .rating-btn.buqu.selected  { background: rgba(192,120,40,0.14); border: 2px solid var(--orange); color: var(--orange); font-weight: bold; box-shadow: 0 2px 8px rgba(192,120,40,0.18); }
    .rating-btn.keyi.selected  { background: rgba(61,138,92,0.14);  border: 2px solid var(--green);  color: var(--green);  font-weight: bold; box-shadow: 0 2px 8px rgba(61,138,92,0.18); }
    .rating-btn.keyi.selected.trust-glow { border: 2.5px solid #C9A063; box-shadow: 0 0 0 3px rgba(201,160,99,0.18), 0 3px 12px rgba(201,160,99,0.28); }
    /* star inside 可以再去 */
    .keyi-star {
      display: none;
      margin-left: 8px;
      font-style: normal;
      cursor: pointer;
      font-size: 1.25rem;
      line-height: 1;
      color: #BBBBBB;
      padding: 2px 4px;
      border-radius: 50%;
      transition: color 0.2s, transform 0.2s, text-shadow 0.2s, background 0.2s;
    }
    .keyi-star:hover {
      color: #DDA520;
      background: rgba(221,165,32,0.12);
      transform: scale(1.15);
    }
    .rating-btn.keyi.selected .keyi-star {
      display: inline-block;
      animation: starAppear 0.38s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    .keyi-star.lit {
      color: #DDA520 !important;
      text-shadow: 0 0 10px rgba(221,165,32,0.75), 0 0 22px rgba(221,165,32,0.35);
      transform: scale(1.25);
    }
    .keyi-star.lit:hover {
      color: #DDA520;
      background: rgba(221,165,32,0.15);
      transform: scale(1.35);
    }
    .keyi-star.bounce {
      animation: starLitBounce 0.45s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    @keyframes starAppear {
      0%   { transform: scale(0) rotate(-40deg); opacity: 0; }
      60%  { transform: scale(1.45) rotate(8deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    @keyframes starLitBounce {
      0%   { transform: scale(1.25); }
      35%  { transform: scale(1.8); }
      65%  { transform: scale(1.05); }
      100% { transform: scale(1.25); }
    }

    /* ── Combo builder — flex-column; every row shares the same 4-cell structure ── */
    .combo-builder {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    /* Every horizontal row (pool row, header row, each input row) uses this */
    .combo-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .combo-row.stretch { align-items: stretch; }
    /* fuben cell: 60 share; xinfa cell: 40 share → exactly 60%/40% of flex space */
    .fuben-cell { flex: 60; min-width: 0; }
    .xinfa-cell  { flex: 40; min-width: 0; }
    /* fixed-size separator slot — reduced to 4px; no visible bar, just air */
    .sep-cell {
      flex: 0 0 4px; width: 4px; flex-shrink: 0;
    }
    /* fixed-size delete slot — 26px in every row */
    .del-cell-ph {
      flex: 0 0 26px; width: 26px; flex-shrink: 0; visibility: hidden;
    }

    /* column header labels */
    .crh-col-label { font-size: 0.78rem; color: var(--text-dim); padding-left: 2px; letter-spacing: 0.5px; }

    /* individual pool panel internal layout */
    .pool-panel {
      width: 100%; box-sizing: border-box;
      background: #F7F3EC; border: 1px solid #E2D9CC;
      border-radius: 8px; padding: 10px 12px;
      display: flex; flex-direction: column; gap: 8px; height: 100%;
    }
    .pool-panel-header {
      display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
    }
    .pool-panel-label {
      font-size: 0.68rem; color: #A89880; letter-spacing: 2px; font-weight: bold;
    }
    .pool-action-btn {
      background: none; border: 1px solid #DDD4C8; border-radius: 5px;
      padding: 2px 8px; font-size: 0.72rem; color: #B0A898;
      cursor: pointer; font-family: inherit; transition: all 0.15s;
    }
    .pool-action-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

    /* collapsible add-fuben row — hidden by default */
    .fuben-add-row { display: none; gap: 5px; align-items: center; }
    .fuben-add-row.open { display: flex; }
    .fuben-add-row input { flex: 1; font-size: 0.78rem; padding: 4px 9px; border-color: #C9A063; color: var(--text); }

    /* fuben chips */
    .fuben-pool { display: flex; flex-wrap: wrap; gap: 5px; align-items: flex-start; flex: 1; }
    .fuben-chip {
      background: #FFFFFF; border: 1px solid #D8D0C4;
      border-radius: 12px; padding: 3px 11px; font-size: 0.8rem;
      cursor: pointer; transition: all 0.15s; color: var(--text-dim); user-select: none;
    }
    .fuben-chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
    .fuben-chip.selected { background: var(--accent-light); border-color: var(--accent); color: var(--accent); font-weight: bold; }
    .fuben-pool-hint { font-size: 0.78rem; color: #BBAA99; }

    /* xinfa chips — uniform grid, 4 per row */
    .xinfa-pool { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; flex: 1; }
    .xinfa-chip {
      background: rgba(74,110,138,0.07); border: 1px solid rgba(74,110,138,0.28);
      border-radius: 8px; padding: 4px 6px; font-size: 0.8rem; text-align: center;
      cursor: pointer; transition: all 0.15s; color: #4A6E8A; user-select: none;
    }
    .xinfa-chip:hover { background: rgba(74,110,138,0.16); border-color: #4A6E8A; }
    .xinfa-chip.selected {
      background: rgba(93,117,153,0.15); border-color: #5D7599;
      color: #3A5878; font-weight: bold;
      box-shadow: 0 0 0 2px rgba(93,117,153,0.18);
    }
    .xinfa-chip.role-heal.selected  { background: rgba(61,138,92,0.16); border-color: #2D7A4E; color: #1E6040; box-shadow: 0 0 0 2px rgba(45,122,78,0.16); }
    .xinfa-chip.role-tank.selected  { background: rgba(154,114,48,0.16); border-color: #8A6228; color: #6A4A18; box-shadow: 0 0 0 2px rgba(154,114,48,0.18); }
    /* healer — green */
    .xinfa-chip.role-heal { background: rgba(61,138,92,0.08); border-color: rgba(61,138,92,0.35); color: #2D7A4E; }
    .xinfa-chip.role-heal:hover { background: rgba(61,138,92,0.18); border-color: #3D8A5C; }
    /* tank — warm gold */
    .xinfa-chip.role-tank { background: rgba(154,114,48,0.09); border-color: rgba(154,114,48,0.38); color: #7A5820; }
    .xinfa-chip.role-tank:hover { background: rgba(154,114,48,0.18); border-color: var(--accent); color: var(--accent); }
    .xinfa-pool-hint { font-size: 0.78rem; color: #BBAA99; grid-column: 1 / -1; }

    /* xinfa manage modal chip */
    .xinfa-manage-chip {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 3px 8px 3px 12px; font-size: 0.82rem; color: var(--text);
    }
    .xinfa-manage-chip button {
      background: none; border: none; cursor: pointer; color: #C0B8B0;
      font-size: 0.9rem; line-height: 1; padding: 0; transition: color 0.15s;
    }
    .xinfa-manage-chip button:hover { color: var(--red); }

    /* ── Combo input rows — 哑光黛蓝描边 ── */
    /* 输入框填满 cell div；cell div 是真正的 flex 项，与 pool 行保持一致 */

    .combo-fuben-input, .combo-xinfa-input {
      display: block; width: 100%;
      border-color: rgba(93,117,153,0.32);
      background: linear-gradient(180deg, #FFFFFF 0%, #F7F5F2 100%);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .combo-fuben-input:hover, .combo-xinfa-input:hover {
      border-color: rgba(93,117,153,0.58);
    }
    .combo-fuben-input:focus, .combo-xinfa-input:focus {
      outline: none;
      border-color: #5D7599;
      box-shadow: 0 0 0 3px rgba(93,117,153,0.14);
    }
    /* delete button exactly fills the del-cell */
    .combo-row-del {
      flex: 0 0 26px; width: 26px; height: 26px; flex-shrink: 0;
      -webkit-appearance: none; appearance: none;
      padding: 0; box-sizing: border-box;
      background: none; border: none; cursor: pointer; color: #D0C8C0;
      font-size: 1.1rem; line-height: 26px; text-align: center;
      transition: color 0.15s; border-radius: 50%;
    }
    .combo-row-del:hover { color: var(--red); background: rgba(168,40,56,0.06); }
    .btn-add-row {
      background: none; border: 1px dashed var(--border); color: var(--text-dim);
      border-radius: 6px; padding: 6px 0; cursor: pointer; font-family: inherit;
      font-size: 0.82rem; width: 100%; transition: all 0.2s;
    }
    .btn-add-row:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Buttons ── */
    .btn-sm {
      background: var(--surface); border: 1px solid var(--border); color: var(--text-dim);
      border-radius: 7px; padding: 6px 14px; cursor: pointer; font-family: inherit;
      font-size: 0.85rem; transition: all 0.2s; white-space: nowrap;
    }
    .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
    .btn-add-combo {
      background: #FFFFFF; border: 1.5px solid var(--green); color: var(--green);
      border-radius: 7px; padding: 8px 16px; cursor: pointer; font-family: inherit;
      font-size: 0.85rem; transition: all 0.2s; white-space: nowrap; font-weight: bold;
    }
    .btn-add-combo:hover { background: rgba(61,138,92,0.07); }

    .form-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 36px; }
    .btn-primary {
      background: linear-gradient(145deg, #DCC070 0%, #C49A3C 48%, #A67C28 100%);
      border: 1px solid rgba(172,132,40,0.45);
      color: #FFFAEA; border-radius: 9px; padding: 10px 28px; cursor: pointer;
      font-family: inherit; font-size: 0.95rem; font-weight: bold;
      letter-spacing: 1px; transition: background 0.2s, box-shadow 0.2s;
      box-shadow: 0 2px 10px rgba(172,132,40,0.28), inset 0 1px 0 rgba(255,240,160,0.28);
    }
    .btn-primary:hover {
      background: linear-gradient(145deg, #ECD480 0%, #D4AA48 48%, #B88830 100%);
      box-shadow: 0 4px 16px rgba(172,132,40,0.40), inset 0 1px 0 rgba(255,240,160,0.32);
    }
    .btn-reset {
      background: none; border: 1px solid var(--border); color: var(--text-dim);
      border-radius: 9px; padding: 10px 20px; cursor: pointer; font-family: inherit;
      font-size: 0.9rem; transition: all 0.2s;
    }
    .btn-reset:hover { border-color: var(--text-dim); color: var(--text); }

    /* ── Table ── */
    .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-pill {
      background: var(--surface); border: 1px solid var(--border); color: var(--text-dim);
      border-radius: 16px; padding: 5px 14px; cursor: pointer; font-family: inherit;
      font-size: 0.82rem; transition: all 0.2s;
    }
    .filter-pill:hover { border-color: rgba(93,117,153,0.50); color: var(--text); }
    .filter-pill.active       { background: var(--accent-light); color: var(--accent); border-color: var(--accent); font-weight: bold; }
    .filter-pill.bilei.active { color: var(--red);    border-color: var(--red);    background: rgba(184,64,80,0.07); }
    .filter-pill.buqu.active  { color: var(--orange); border-color: var(--orange); background: rgba(192,120,40,0.07); }
    .filter-pill.keyi.active  { color: var(--green);  border-color: var(--green);  background: rgba(61,138,92,0.07); }
    .filter-pill.starred.active{color: var(--star);   border-color: var(--star);   background: rgba(192,144,32,0.07); }

    .table-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .table-toolbar .count { color: var(--text-dim); font-size: 0.88rem; }
    .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow); }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; background: var(--surface); }
    thead tr { background: var(--card); }

<header>
  <div class="header-brand">
    <h1><span class="h1-icon">⚔</span>团牌记录</h1>

  <div class="header-actions">
    <span class="header-season"></span>
    <div class="header-data-center">
      <span id="syncBadge" class="sync-badge hidden"></span>
      <button id="btnBackup" class="btn-backup" style="display:none" onclick="manualBackup()">手动备份</button>
    </div>
  </div>
</header>

<nav>
  <button class="active" onclick="switchTab('input')">录入团牌</button>
  <button onclick="switchTab('list')">团牌列表</button>
  <button onclick="switchTab('search')">搜索</button>
</nav>

<main>

  <!-- ── TAB: 录入 ── -->
  <div id="tab-input" class="tab-panel active">
    <div class="card">
      <div class="card-title" id="formTitle">📋 新增团牌记录</div>
      <form id="recordForm" onsubmit="submitRecord(event)">

        <!-- 第一层：环境 -->
        <div class="section-divider"><span>环 境</span></div>
        <div class="form-grid">
          <div class="form-group">
            <label>团牌</label>
            <input type="text" id="f-tuanpai" autofocus oninput="autoTrustByName(this.value)">
          </div>
          <div class="form-group">
            <label>团长ID</label>
            <input type="text" id="f-tuanzhang" placeholder="游戏内ID">
          </div>
          <div class="form-group">
            <label>区服</label>
            <input type="text" id="f-qufu" placeholder="例：蝶恋花">
          </div>
        </div>

        <!-- 第二层：参战信息 -->
        <div class="section-divider"><span>参 战 信 息</span></div>

        <!-- 4-column grid: all rows (pools, header, inputs) share the same columns -->
        <div class="combo-builder">

          <!-- Row 1: pool panels — same 4-cell flex structure as every input row -->
          <div class="combo-row stretch">
            <div class="fuben-cell">
              <div class="pool-panel pool-fuben-panel">
                <div class="pool-panel-header">
                  <span class="pool-panel-label">常用副本</span>
                  <button type="button" class="pool-action-btn" onclick="toggleFubenAdd()" id="fubenAddToggle">＋ 新增</button>
                </div>
                <div class="fuben-add-row" id="fubenAddRow">
                  <input type="text" id="fubenInput" placeholder="输入副本名称…" onkeydown="if(event.key==='Enter'){event.preventDefault();addFuben();}">
                  <button type="button" class="pool-action-btn" onclick="addFuben()">确认</button>
                </div>
                <div class="fuben-pool" id="fubenPool">
                  <span class="fuben-pool-hint">暂无副本</span>
                </div>
              </div>
            </div>
            <span class="sep-cell"></span>
            <div class="xinfa-cell">
              <div class="pool-panel pool-xinfa-panel">
                <div class="pool-panel-header">
                  <span class="pool-panel-label">常用心法</span>
                  <button type="button" class="pool-action-btn" onclick="openXinfaManage()">⚙ 管理</button>
                </div>
                <div class="xinfa-pool" id="xinfaPool">
                  <span class="xinfa-pool-hint">加载中…</span>
                </div>
              </div>
            </div>
            <span class="del-cell-ph"></span>
          </div>

          <!-- Row 2: column header labels -->
          <div class="combo-row">
            <div class="fuben-cell"><span class="crh-col-label">副本</span></div>
            <span class="sep-cell"></span>
            <div class="xinfa-cell"><span class="crh-col-label">心法</span></div>
            <span class="del-cell-ph"></span>
          </div>

          <!-- Rows 3+: combo input rows (added dynamically via JS) -->
          <div id="comboRows"></div>

        </div>

        <!-- 第三层：评价 -->
        <div class="section-divider"><span>评 价</span></div>
        <div class="rating-group" id="ratingGroup">
          <label class="rating-btn bilei">
            <input type="radio" name="pingjia" value="避雷"> ⚠ 避雷
          </label>
          <label class="rating-btn buqu">
            <input type="radio" name="pingjia" value="不太想再去"> 😐 不太想再去
          </label>
          <label class="rating-btn keyi">
            <input type="radio" name="pingjia" value="可以再去"> ✓ 可以再去 <em class="keyi-star" onclick="toggleFormStar(event)">☆</em>
          </label>
        </div>

        <!-- 第四层：详细 -->
        <div class="section-divider"><span>详 细</span></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          <div class="form-group">
            <label>具体评价</label>
            <textarea id="f-beizhu" placeholder="例：招募要求、团队氛围、攻略情况…"></textarea>
          </div>
          <div class="form-group">
            <label>其他</label>
            <textarea id="f-qita" placeholder="其他补充信息…"></textarea>
          </div>
        </div>

        <div class="form-actions">
          <button type="button" class="btn-reset" onclick="confirmReset()">清空</button>
          <button type="submit" class="btn-primary">保存记录</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ── TAB: 列表 ── -->
  <div id="tab-list" class="tab-panel">
    <div class="filter-bar">
      <button class="filter-pill active"   onclick="setFilter('all',this)">全部</button>
      <button class="filter-pill bilei"    onclick="setFilter('避雷',this)">⚠ 避雷</button>
      <button class="filter-pill buqu"     onclick="setFilter('不太想再去',this)">😐 不太想再去</button>
      <button class="filter-pill keyi"     onclick="setFilter('可以再去',this)">✓ 可以再去</button>
      <button class="filter-pill starred"  onclick="setFilter('starred',this)">★ 信任团牌</button>
    </div>
    <div class="table-toolbar">
      <span class="count" id="tableCount">共 0 条记录</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="th-c">评价</th>
            <th>团牌</th>
            <th>团长ID</th>
            <th>区服</th>
            <th>参战记录</th>
            <th>具体评价</th>
            <th>其他</th>
            <th>日期</th>
            <th class="th-c">操作</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- ── TAB: 搜索 ── -->
  <div id="tab-search" class="tab-panel">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="输入团长名号或江湖 ID 以溯往昔…" oninput="doSearch()">
      <button onclick="doSearchAndSave()">搜索</button>
    </div>
    <div id="searchHistory" class="search-history"></div>
    <div id="searchResults" class="search-results">
      <div class="no-result">输入关键词开始搜索</div>
    </div>
  </div>

</main>

<div id="toast"></div>

<div class="modal-overlay" id="xinfaManageModal">

  if (!SHEET_URL) { el.className = 'sync-badge hidden'; return; }
  const cfg = {
    syncing: { cls: 'syncing', html: '<span class="sync-icon">↻</span> 同步中…', tip: '正在同步到云端' },
    ok:      { cls: 'ok',      html: '☁ 已自动同步', tip: '云端数据已是最新' },
    error:   { cls: 'error',   html: '⚠ 同步失败',   tip: '数据已保存在本地，云端同步失败' },
  };
  const c = cfg[state];
  if (!c) return;
  el.className = 'sync-badge ' + c.cls;
  el.innerHTML = c.html;
  el.title = c.tip;
}

// 页面加载时从 Sheet 拉取最新数据（Sheet 为多人共享的主数据源）
async function fetchFromSheet() {
  if (!SHEET_URL) return;
  const btn = document.getElementById('btnBackup');
  if (btn) btn.style.display = '';   // 显示「手动备份」按钮
  setSyncStatus('syncing');
  try {
    const res  = await fetch(`${SHEET_URL}?action=getAll&key=${encodeURIComponent(SHEET_KEY)}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    if (Array.isArray(data) && data.length > 0) {
      // 合并：Sheet 记录为准，但保留本地独有记录（如 py 导入但未同步的）
      const sheetIds = new Set(data.map(r => String(r.id)));
      const localOnly = records.filter(r => !sheetIds.has(String(r.id)));
      records = [...data, ...localOnly];
      localStorage.setItem(DB_KEY, JSON.stringify(records));
      updateHeaderCount();
      // 若当前在列表标签则刷新渲染
      const listPanel = document.getElementById('tab-list');
      if (listPanel && listPanel.classList.contains('active')) renderTable();
    }
    setSyncStatus('ok');
  } catch (e) {
    setSyncStatus('error');
  }
}

// 新增 / 更新单条记录推送到 Sheet
async function pushUpsert(record) {
  if (!SHEET_URL) return;
  setSyncStatus('syncing');
  try {
    const data = encodeURIComponent(JSON.stringify(record));
    const res  = await fetch(`${SHEET_URL}?action=upsert&key=${encodeURIComponent(SHEET_KEY)}&data=${data}`);
    const json = await res.json();
    if (json.error) throw new Error(json.error);
    setSyncStatus('ok');
  } catch (e) {
    setSyncStatus('error');
  }
}

// 删除单条记录推送到 Sheet
async function pushDelete(id) {
  if (!SHEET_URL) return;
  setSyncStatus('syncing');
  try {
    const res  = await fetch(`${SHEET_URL}?action=delete&key=${encodeURIComponent(SHEET_KEY)}&id=${encodeURIComponent(id)}`);
    const json = await res.json();
    if (json.error) throw new Error(json.error);
    setSyncStatus('ok');
  } catch (e) {
    setSyncStatus('error');
  }
}

// 全量同步：分批将本地所有数据上传到云端（每批 10 条，避免 URL 过长）
async function syncAllToSheet() {
  if (!SHEET_URL) { showToast('请先在代码中配置 SHEET_URL'); return; }
  setSyncStatus('syncing');
  try {
    const BATCH = 10;
    for (let i = 0; i < records.length; i += BATCH) {
      const data = encodeURIComponent(JSON.stringify(records.slice(i, i + BATCH)));
      const res  = await fetch(`${SHEET_URL}?action=upsertBatch&key=${encodeURIComponent(SHEET_KEY)}&data=${data}`);
      const json = await res.json();
      if (json.error) throw new Error(json.error);
    }
    setSyncStatus('ok');
    showToast('✓ 已全部同步到云端');
  } catch (e) {
    setSyncStatus('error');
    showToast('⚠ 同步失败，请检查网络');
  }
}

// 手动备份到 Google Drive
async function manualBackup() {
  if (!SHEET_URL) { showToast('请先配置 SHEET_URL'); return; }
  if (!records.length) { showToast('暂无记录可备份'); return; }
  const btn = document.getElementById('btnBackup');
  if (btn) { btn.textContent = '备份中…'; btn.disabled = true; }
  try {
    const res  = await fetch(`${SHEET_URL}?action=export&key=${encodeURIComponent(SHEET_KEY)}`);
    const json = await res.json();
    if (json.error) throw new Error(json.error);
    showToast('✓ 备份已保存到 Google Drive');
    window.open(json.url, '_blank');
  } catch (e) {
    showToast('⚠ 备份失败，请检查网络');
  } finally {
    if (btn) { btn.textContent = '手动备份'; btn.disabled = false; }
  }
}

const DEFAULT_FUBENS = ['英雄弓月城', '普通弓月城'];
const DEFAULT_XINFAS = ['冰心', '花间', '毒经', '无方', '段氏', '衍天', '万灵', '无相'];
const HEAL_XINFAS = new Set(['奶秀','奶毒','奶花','奶药','奶歌']);
const TANK_XINFAS = new Set(['喵T','策T','苍T','秃T']);
function getXinfaRole(name) {
  if (HEAL_XINFAS.has(name)) return 'heal';
  if (TANK_XINFAS.has(name)) return 'tank';
  return 'dps';
}

function loadRecords() { try { return JSON.parse(localStorage.getItem(DB_KEY))    || []; } catch { return []; } }
function saveRecords(r) { localStorage.setItem(DB_KEY, JSON.stringify(r)); }
function loadFubens()  { try { return JSON.parse(localStorage.getItem(FUBEN_KEY)) || [...DEFAULT_FUBENS]; } catch { return [...DEFAULT_FUBENS]; } }
function saveFubens(f) { localStorage.setItem(FUBEN_KEY, JSON.stringify(f)); }
function loadXinfas()  { try { return JSON.parse(localStorage.getItem(XINFA_KEY)) || [...DEFAULT_XINFAS]; } catch { return [...DEFAULT_XINFAS]; } }
function saveXinfas(x) { localStorage.setItem(XINFA_KEY, JSON.stringify(x)); }
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// ── State ──
let records          = loadRecords();
let fubens           = loadFubens();
let xinfas           = loadXinfas();
let activeFubenInput = null;  // the combo-fuben-input currently focused
let activeXinfaInput = null;  // the combo-xinfa-input currently focused
let currentFilter    = 'all';
let pendingDeleteId  = null;
let editingId        = null;

// ── Tab switching ──
function switchTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach((b,i) => {
    b.classList.toggle('active', ['input','list','search'][i] === name);
  });
  document.getElementById('tab-'+name).classList.add('active');
  if (name === 'list') renderTable();
}

// ── Fuben pool ──
function renderFubenPool() {
  const pool = document.getElementById('fubenPool');
  if (!fubens.length) {
    pool.innerHTML = '<span class="fuben-pool-hint">暂无副本，请在下方新增</span>';
    return;
  }
  pool.innerHTML = fubens.map((f, i) =>
    `<span class="fuben-chip" onclick="selectFuben(${i})">${escHtml(f)}</span>`
  ).join('');
}

function selectFuben(idx) {
  const name = fubens[idx];
  // fill the focused fuben input, or the first empty one
  let target = activeFubenInput && document.contains(activeFubenInput) ? activeFubenInput : null;
  if (!target) {
    const inputs = document.querySelectorAll('.combo-fuben-input');
    target = Array.from(inputs).find(i => !i.value.trim()) || inputs[inputs.length - 1];
  }
  if (target) { target.value = name; target.focus(); activeFubenInput = target; }
}

function toggleFubenAdd() {
  const row = document.getElementById('fubenAddRow');
  const opening = !row.classList.contains('open');
  row.classList.toggle('open', opening);
  if (opening) document.getElementById('fubenInput').focus();
}

function addFuben() {
  const input = document.getElementById('fubenInput');
  const name  = input.value.trim();
  if (!name) { showToast('请输入副本名称'); return; }
  if (fubens.includes(name)) { showToast('该副本已存在'); return; }
  fubens.push(name);
  saveFubens(fubens);
  renderFubenPool();
  input.value = '';
  document.getElementById('fubenAddRow').classList.remove('open');
  showToast(`已新增副本：${name}`);
}

// ── Xinfa pool ──
function renderXinfaPool() {
  const pool = document.getElementById('xinfaPool');
  if (!xinfas.length) {
    pool.innerHTML = '<span class="xinfa-pool-hint">暂无，点击右侧管理添加</span>';
    return;
  }
  pool.innerHTML = xinfas.map((x, i) =>
    `<span class="xinfa-chip role-${getXinfaRole(x)}" onclick="selectXinfa(${i})">${escHtml(x)}</span>`
  ).join('');
}

function selectXinfa(idx) {
  const name = xinfas[idx];
  let target = activeXinfaInput && document.contains(activeXinfaInput) ? activeXinfaInput : null;
  if (!target) {
    const inputs = document.querySelectorAll('.combo-xinfa-input');
    target = Array.from(inputs).find(i => !i.value.trim()) || inputs[inputs.length - 1];
  }
  if (target) { target.value = name; target.focus(); activeXinfaInput = target; }
  // 视觉选中态：清除全部，标记当前
  document.querySelectorAll('.xinfa-chip').forEach(c => c.classList.remove('selected'));
  const chips = document.querySelectorAll('.xinfa-chip');
  if (chips[idx]) chips[idx].classList.add('selected');
}

// ── Xinfa manage modal ──
function openXinfaManage() {
  renderXinfaManageList();
  document.getElementById('xinfaManageModal').classList.add('open');
}
function closeXinfaManage() {
  document.getElementById('xinfaManageModal').classList.remove('open');
}
function renderXinfaManageList() {
  const container = document.getElementById('xinfaManageList');
  if (!xinfas.length) {
    container.innerHTML = '<span style="color:var(--text-dim);font-size:0.85rem;">暂无，请在下方新增</span>';
    return;
  }
  container.innerHTML = xinfas.map((x, i) =>
    `<span class="xinfa-manage-chip">${escHtml(x)}<button onclick="removeXinfa(${i})" title="删除">×</button></span>`
  ).join('');
}
function addXinfaFromManage() {
  const input = document.getElementById('xinfaManageInput');
  const name  = input.value.trim();
  if (!name) return;
  if (xinfas.includes(name)) { showToast('该心法已存在'); return; }
  xinfas.push(name);
  saveXinfas(xinfas);
  renderXinfaPool();
  renderXinfaManageList();
  input.value = '';
}
function removeXinfa(idx) {
  xinfas.splice(idx, 1);
  saveXinfas(xinfas);
  renderXinfaPool();
  renderXinfaManageList();
}

// ── Combo rows ──
function addComboRow(fuben = '', xinfa = '') {
  const rows = document.getElementById('comboRows');
  const div  = document.createElement('div');
  div.className = 'combo-row combo-row-item';
  div.innerHTML = `
    <div class="fuben-cell"><input type="text" class="combo-fuben-input" placeholder="请输入或上方点选副本" value="${escHtml(fuben)}"></div>
    <span class="sep-cell"></span>
    <div class="xinfa-cell"><input type="text" class="combo-xinfa-input" placeholder="心法（如：奶秀）" value="${escHtml(xinfa)}"></div>
    <button type="button" class="combo-row-del" title="删除此行" onclick="removeComboRow(this)">×</button>
  `;
  div.querySelector('.combo-fuben-input').addEventListener('focus', e => { activeFubenInput = e.target; });
  div.querySelector('.combo-xinfa-input').addEventListener('focus', e => { activeXinfaInput = e.target; });
  rows.appendChild(div);
  updateRowDelBtns();
}

function removeComboRow(btn) {
  btn.closest('.combo-row-item').remove();
  updateRowDelBtns();
}

function updateRowDelBtns() {
  const rows = document.querySelectorAll('.combo-row-item');
  rows.forEach(row => {
    row.querySelector('.combo-row-del').style.visibility = rows.length > 1 ? 'visible' : 'hidden';
  });
}

function getCombosFromRows() {
  return Array.from(document.querySelectorAll('.combo-row-item'))
    .map(row => ({
      fuben: row.querySelector('.combo-fuben-input').value.trim(),
      xinfa: row.querySelector('.combo-xinfa-input').value.trim()
    }))
    .filter(c => c.fuben || c.xinfa);
}

function initComboRows(combos) {
  document.getElementById('comboRows').innerHTML = '';
  activeFubenInput = null;
  activeXinfaInput = null;
  if (combos && combos.length) combos.forEach(c => addComboRow(c.fuben, c.xinfa));
  else addComboRow();
}

// ── Rating buttons ──
let formXingxing = false;

document.querySelectorAll('.rating-btn').forEach(btn => {
  btn.addEventListener('click', (e) => {
    if (e.target.classList.contains('keyi-star')) return; // star handled separately
    const wasKeyi = btn.classList.contains('keyi');
    document.querySelectorAll('.rating-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    if (!wasKeyi) {
      // switched away from or never was 可以再去 — reset star
      formXingxing = false;
      const star = document.querySelector('.keyi-star');
      if (star) star.classList.remove('lit');
    }
  });
});

function autoTrustByName(name) {
  if (editingId) return; // 编辑模式不干预
  const n = name.trim();
  if (!n) return;
  const trusted = records.some(r => r.tuanpai === n && r.xingxing);
  if (trusted === formXingxing) return;
  formXingxing = trusted;
  const star   = document.querySelector('.keyi-star');
  const keyiBtn = document.querySelector('.rating-btn.keyi');
  if (!star) return;
  star.classList.toggle('lit', trusted);
  star.textContent = trusted ? '★' : '☆';
  if (keyiBtn) keyiBtn.classList.toggle('trust-glow', trusted);
  if (trusted) showToast('⭐ 检测到信任团牌，已自动标记');
}

function toggleFormStar(e) {
  e.stopPropagation();
  const star = e.currentTarget;
  formXingxing = !formXingxing;
  star.classList.toggle('lit', formXingxing);
  const keyiBtn = document.querySelector('.rating-btn.keyi');
  if (formXingxing) {
    star.textContent = '★';
    star.classList.remove('bounce');
    void star.offsetWidth;
    star.classList.add('bounce');
    if (keyiBtn) keyiBtn.classList.add('trust-glow');
    showToast('⭐ 已标记为信任团');
  } else {
    star.textContent = '☆';
    if (keyiBtn) keyiBtn.classList.remove('trust-glow');
  }
}

// ── Form submit ──
function submitRecord(e) {
  e.preventDefault();
  const pingjia = document.querySelector('input[name="pingjia"]:checked')?.value;
  if (!pingjia) { showToast('请选择评价'); return; }

  const origTime = editingId
    ? (records.find(r => String(r.id) === String(editingId))?.time ?? '')
    : new Date().toLocaleDateString('zh-CN');

  const record = {
    id:       editingId || genId(),
    tuanpai:  document.getElementById('f-tuanpai').value.trim(),
    tuanzhang:document.getElementById('f-tuanzhang').value.trim(),
    qufu:     document.getElementById('f-qufu').value.trim(),
    pingjia,
    combos:   getCombosFromRows(),
    beizhu:   document.getElementById('f-beizhu').value.trim(),
    qita:     document.getElementById('f-qita').value.trim(),
    xingxing: pingjia === '可以再去' ? formXingxing : false,
    time:     origTime
  };

  if (editingId) {
    const idx = records.findIndex(r => String(r.id) === String(editingId));
    if (idx !== -1) { records[idx] = record; }
    editingId = null;
    document.getElementById('formTitle').textContent = '📋 新增团牌记录';
  } else {
    records.unshift(record);
  }

  saveRecords(records);
  pushUpsert(record);
  updateHeaderCount();
  resetForm();
  showToast('记录已保存！');
}

function resetForm() {
  ['f-tuanpai','f-tuanzhang','f-qufu','f-beizhu','f-qita'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.querySelectorAll('input[name="pingjia"]').forEach(r => r.checked = false);
  document.querySelectorAll('.rating-btn').forEach(b => b.classList.remove('selected'));
  formXingxing = false;
  const fstar = document.querySelector('.keyi-star');
  if (fstar) { fstar.classList.remove('lit', 'bounce'); fstar.textContent = '☆'; }
  const keyiBtn = document.querySelector('.rating-btn.keyi');
  if (keyiBtn) keyiBtn.classList.remove('trust-glow');
  editingId = null;
  document.getElementById('formTitle').textContent = '📋 新增团牌记录';
  renderFubenPool();
  initComboRows();
}

// ── Helpers ──
function ratingClass(p) {
  return p === '避雷' ? 'bilei' : p === '不太想再去' ? 'buqu' : p === '可以再去' ? 'keyi' : '';
}

// Backward-compat: old records may have fuben/jiaose strings instead of combos array
function getCombos(r) {
  if (Array.isArray(r.combos) && r.combos.length) return r.combos;
  const fuben = r.fuben || '', xinfa = r.jiaose || '';
  if (fuben || xinfa) return [{fuben, xinfa}];
  return [];
}

function renderTableCombos(combos) {
  const filled = combos.filter(c => c.fuben || c.xinfa);
  if (!filled.length) return '<span style="color:var(--border)">—</span>';
  return `<div class="table-combos">${filled.map(c => {
    const f = escHtml(c.fuben), x = escHtml(c.xinfa);
    return `<span class="table-combo-chip">
      ${f ? `<span class="tcc-fuben">${f}</span>` : ''}
      ${f && x ? `<span class="tcc-sep">｜</span>` : ''}
      ${x ? `<span class="tcc-xinfa">${x}</span>` : ''}
    </span>`;
  }).join('')}</div>`;
}

function renderSearchCombos(combos) {
  return combos.filter(c => c.fuben || c.xinfa).map(c => {
    const f = escHtml(c.fuben), x = escHtml(c.xinfa);
    return `<span class="table-combo-chip">
      ${f ? `<span class="tcc-fuben">${f}</span>` : ''}
      ${f && x ? `<span class="tcc-sep">｜</span>` : ''}
      ${x ? `<span class="tcc-xinfa">${x}</span>` : ''}
    </span>`;
  }).join('');
}

// ── Table ──
function renderTable() {
  let data = records;
  if (currentFilter === 'starred') data = data.filter(r => r.xingxing && r.pingjia === '可以再去');
  else if (currentFilter !== 'all') data = data.filter(r => r.pingjia === currentFilter);

  document.getElementById('tableCount').textContent = `共 ${data.length} 条记录`;
  const tbody = document.getElementById('tableBody');

  if (!data.length) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state">
      <div class="empty-icon">📜</div>
      <div class="empty-title">暂无记录</div>
      <div class="empty-hint">快去「录入团牌」留下你的第一笔江湖足迹吧！</div>
    </div></td></tr>`;
    return;
  }

  tbody.innerHTML = data.map(r => {
    const cls      = ratingClass(r.pingjia);
    const canStar  = r.pingjia === '可以再去';
    const combos   = getCombos(r);
    const ratingIcon = r.pingjia === '避雷' ? '⚠' : r.pingjia === '不太想再去' ? '😐' : '✓';
    return `<tr class="${r.xingxing && canStar ? 'row-starred' : ''}">
      <td class="rating-cell ${cls}"><span class="rating-badge">${ratingIcon} ${escHtml(r.pingjia)}</span></td>
      <td>
        <div class="tuanpai-cell">
          ${canStar
            ? `<button class="star-toggle ${r.xingxing?'starred':''}" onclick="toggleStar('${r.id}')" data-tip="${r.xingxing?'取消信任':'标记为信任团牌'}">${r.xingxing?'★':'☆'}</button>`
            : '<span class="star-ph"></span>'}
          <strong>${escHtml(r.tuanpai || '—')}</strong>
        </div>
      </td>
      <td>${escHtml(r.tuanzhang || '—')}</td>
      <td>${escHtml(r.qufu || '—')}</td>
      <td>${renderTableCombos(combos)}</td>
      <td class="truncate" title="${escHtml(r.beizhu)}">${escHtml(r.beizhu || '—')}</td>
      <td class="truncate" title="${escHtml(r.qita)}">${escHtml(r.qita || '—')}</td>
      <td style="white-space:nowrap;color:var(--text-dim);font-size:0.8rem">${escHtml(r.time || '')}</td>
      <td>
        <div class="action-btns">
          <button class="btn-icon edit" onclick="editRecord('${r.id}')"   data-tip="编辑">✎</button>
          <button class="btn-icon del"  onclick="deleteRecord('${r.id}')" data-tip="删除">🗑</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  renderTable();
}

function toggleStar(id) {
  const r = records.find(r => String(r.id) === String(id));
  if (!r || r.pingjia !== '可以再去') return;
  r.xingxing = !r.xingxing;
  saveRecords(records);
  renderTable();
  showToast(r.xingxing ? '⭐ 已标记为信任团牌' : '取消信任标记');
}

// ── Edit ──
function editRecord(id) {
  const sid = String(id);
  const r = records.find(r => String(r.id) === sid);
  if (!r) return;
  switchTab('input');
  editingId = id;
  document.getElementById('formTitle').textContent = '✏ 编辑团牌记录';
  document.getElementById('f-tuanpai').value   = r.tuanpai   || '';
  document.getElementById('f-tuanzhang').value = r.tuanzhang || '';
  document.getElementById('f-qufu').value      = r.qufu      || '';
  document.getElementById('f-beizhu').value    = r.beizhu    || '';
  document.getElementById('f-qita').value      = r.qita      || '';
  document.querySelectorAll('input[name="pingjia"]').forEach(radio => {
    radio.checked = radio.value === r.pingjia;
  });
  document.querySelectorAll('.rating-btn').forEach(btn => {
    btn.classList.toggle('selected', btn.querySelector('input').value === r.pingjia);
  });
  formXingxing = !!r.xingxing;
  const fstar = document.querySelector('.keyi-star');
  if (fstar) { fstar.classList.toggle('lit', formXingxing); fstar.textContent = formXingxing ? '★' : '☆'; }
  renderFubenPool();
  initComboRows(getCombos(r));
  window.scrollTo(0, 0);
}

// ── Delete ──
function deleteRecord(id) { pendingDeleteId = String(id); document.getElementById('confirmModal').classList.add('open'); }
function closeModal()      { document.getElementById('confirmModal').classList.remove('open'); pendingDeleteId = null; }
function confirmDelete() {
  if (pendingDeleteId == null) return;
  records = records.filter(r => String(r.id) !== pendingDeleteId);
  saveRecords(records);
  pushDelete(pendingDeleteId);
  updateHeaderCount();
  closeModal();
  renderTable();
  showToast('记录已删除');
}

// ── Search ──
function loadSearchHistory() {
  try { return JSON.parse(localStorage.getItem(SEARCH_HISTORY_KEY) || '[]'); } catch { return []; }
}
function saveToSearchHistory(q) {
  if (!q) return;
  const hist = loadSearchHistory().filter(h => h !== q);
  hist.unshift(q);
  localStorage.setItem(SEARCH_HISTORY_KEY, JSON.stringify(hist.slice(0, 5)));
  renderSearchHistory();
}
function clearSearchHistory() {
  localStorage.removeItem(SEARCH_HISTORY_KEY);
  renderSearchHistory();
}
function renderSearchHistory() {
  const hist = loadSearchHistory();
  const el = document.getElementById('searchHistory');
  if (!el || !hist.length) { if (el) el.innerHTML = ''; return; }
  el.innerHTML = '<span class="search-history-label">近期搜索</span>' +
    hist.map((h, i) => `<button class="search-history-chip" onclick="doHistorySearch(${i})">${escHtml(h)}</button>`).join('') +
    '<button class="search-history-clear" onclick="clearSearchHistory()" title="清空记录">🗑</button>';
}
function doHistorySearch(idx) {
  const q = loadSearchHistory()[idx];
  if (!q) return;
  document.getElementById('searchInput').value = q;
  saveToSearchHistory(q);
  doSearch();
}
// 只搜索，不记录（oninput 实时过滤用）
function doSearch() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const container = document.getElementById('searchResults');
  if (!q) { container.innerHTML = '<div class="no-result">输入关键词开始搜索</div>'; return; }

  const results = records
    .filter(r =>
      (r.tuanpai  || '').toLowerCase().includes(q) ||
      (r.tuanzhang|| '').toLowerCase().includes(q)
    )
    .sort((a, b) => (b.xingxing ? 1 : 0) - (a.xingxing ? 1 : 0));
  if (!results.length) { container.innerHTML = '<div class="no-result">没有找到相关团牌记录</div>'; return; }

  container.innerHTML = results.map(r => {
    const cls     = ratingClass(r.pingjia);
    const hasStar = r.pingjia === '可以再去' && r.xingxing;
    const combos  = getCombos(r);
    const beizhu  = (r.beizhu || '').trim();
    const qita    = (r.qita   || '').trim();
    const ratingIcon = r.pingjia === '避雷' ? '⚠' : r.pingjia === '不太想再去' ? '😐' : '✓';
    const stampMap  = { '避雷': ['诫','bilei'], '可以再去': ['良','keyi'] };
    const stampInfo = stampMap[r.pingjia];
    const stamp = stampInfo ? `<div class="sc-stamp ${stampInfo[1]}">${stampInfo[0]}</div>` : '';
    return `<div class="search-card">
      ${stamp}
      <div class="sc-header">
        <span class="rating-badge ${cls}">${ratingIcon} ${escHtml(r.pingjia)}</span>
        <span class="search-tuanpai">${escHtml(r.tuanpai || '（无团牌名）')}</span>
        ${hasStar ? '<span class="search-star">★</span>' : ''}
      </div>
      <div class="search-meta">
        ${r.tuanzhang ? `<span><i class="mi">✦</i>${escHtml(r.tuanzhang)}</span>` : ''}
        ${r.qufu      ? `<span><i class="mi">◉</i>${escHtml(r.qufu)}</span>`      : ''}
        ${r.time      ? `<span><i class="mi">◷</i>${formatDateChinese(r.time)}</span>` : ''}
      </div>
      ${combos.some(c => c.fuben || c.xinfa) ? `<div class="search-combos">${renderSearchCombos(combos)}</div>` : ''}
      ${(beizhu || qita) ? `<div class="search-notes">
        ${beizhu ? escHtml(beizhu) : ''}
        ${beizhu && qita ? '<div class="notes-divider"></div>' : ''}
        ${qita ? `<div class="notes-qita"><span class="notes-qita-label">记</span>${escHtml(qita)}</div>` : ''}
      </div>` : ''}
    </div>`;
  }).join('');
}

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Utils ──
function formatDateChinese(dateStr) {
  if (!dateStr) return '';
  const parts = dateStr.replace(/\//g, '-').split('-');
  if (parts.length < 2) return dateStr;
  const han = ['〇','一','二','三','四','五','六','七','八','九'];
  const yearHan = String(parts[0]).split('').map(c => han[+c] ?? c).join('');
  const month = parseInt(parts[1], 10);
  const day   = parts[2] ? parseInt(parts[2], 10) : 0;
  const toHanNum = n => {
    if (n <= 0) return '';
    if (n <= 9)  return han[n];
    if (n === 10) return '十';
    if (n < 20)  return '十' + han[n - 10];
    if (n === 20) return '二十';
    if (n < 30)  return '二十' + han[n - 20];
    if (n === 30) return '三十';
    return '三十' + han[n - 30];
  };
  const monthHan = toHanNum(month);
  const dayHan   = day ? toHanNum(day) + '日' : '';
  return `${yearHan}年 · ${monthHan}月${dayHan ? dayHan : ''}`;
}
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function confirmReset() { document.getElementById('resetModal').classList.add('open'); }
function closeResetModal() { document.getElementById('resetModal').classList.remove('open'); }
function doReset() { closeResetModal(); resetForm(); }

document.getElementById('xinfaManageModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeXinfaManage(); });

// 点击搜索按钮 / 回车时才记录历史
function doSearchAndSave() {
  const q = document.getElementById('searchInput').value.trim();

  doSearch();
}
document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') doSearchAndSave(); });

// ── 汉字计数 ──
function toChineseNum(n) {
  if (n === 0) return '〇';
  const d = ['', '一', '二', '三', '四', '五', '六', '七', '八', '九'];
  if (n < 10)  return d[n];
  if (n < 20)  return n === 10 ? '十' : '十' + d[n % 10];
  if (n < 100) return d[Math.floor(n / 10)] + '十' + (n % 10 ? d[n % 10] : '');
  return String(n);
}
function updateHeaderCount() {
  const el = document.getElementById('headerCountNum');
  if (el) el.textContent = toChineseNum(records.length);
}

// ── 节气 ──
function getCurrentJieqi() {
  // 近似日期表（适用于2024-2028，误差±1天）
  const terms = [
    ['小寒',  1,  6], ['大寒',  1, 20],
    ['立春',  2,  4], ['雨水',  2, 19],
    ['惊蛰',  3,  6], ['春分',  3, 21],
    ['清明',  4,  5], ['谷雨',  4, 20],
    ['立夏',  5,  6], ['小满',  5, 21],
    ['芒种',  6,  6], ['夏至',  6, 21],
    ['小暑',  7,  7], ['大暑',  7, 23],
    ['立秋',  8,  7], ['处暑',  8, 23],
    ['白露',  9,  8], ['秋分',  9, 23],
    ['寒露', 10,  8], ['霜降', 10, 23],
    ['立冬', 11,  7], ['小雪', 11, 22],
    ['大雪', 12,  7], ['冬至', 12, 22],
  ];
  const now = new Date();
  const m = now.getMonth() + 1, d = now.getDate();
  // 找最近一个已过或当天的节气
  let current = terms[terms.length - 1][0];
  for (let i = terms.length - 1; i >= 0; i--) {
    const [name, tm, td] = terms[i];
    if (m > tm || (m === tm && d >= td)) { current = name; break; }
  }
  return current;
}
function updateJieqiBadge() {
  const el = document.querySelector('.header-season');
  if (el) el.textContent = getCurrentJieqi().split('').join(' ');
}
